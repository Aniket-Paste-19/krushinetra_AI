{% extends 'base.html' %}
{% block title %}शेतकरी नोंदणी{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="h4 mb-3">शेतकरी नोंदणी</h2>
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">पूर्ण नाव</label>
                        <input class="form-control" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">ईमेल</label>
                        <input class="form-control" name="email" type="email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">फोन</label>
                        <input class="form-control" name="phone">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">पासवर्ड</label>
                        <input class="form-control" name="password" type="password" required>
                    </div>
                    <button class="btn btn-success w-100">खाते तयार करा</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
