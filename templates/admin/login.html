{% extends 'base.html' %}
{% block title %}अॅडमिन लॉगिन{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="h4 mb-3">अॅडमिन लॉगिन</h2>
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">युजरनेम</label>
                        <input class="form-control" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">पासवर्ड</label>
                        <input class="form-control" type="password" name="password" required>
                    </div>
                    <button class="btn btn-dark w-100">लॉगिन</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
